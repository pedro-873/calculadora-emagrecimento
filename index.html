<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Emagrecimento</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #007bff; text-align: center; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #219150; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; background: #e8f5e9; }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora Fitness</h2>
    
    <div class="field">
        <label>Gênero</label>
        <select id="genero">
            <option value="m">Masculino</option>
            <option value="f">Feminino</option>
        </select>
    </div>

    <div class="field">
        <label>Idade</label>
        <input type="number" id="idade" placeholder="Ex: 25">
    </div>

    <div class="field">
        <label>Peso (kg)</label>
        <input type="number" id="peso" placeholder="Ex: 80">
    </div>

    <div class="field">
        <label>Altura (cm)</label>
        <input type="number" id="altura" placeholder="Ex: 175">
    </div>

    <button onclick="calcular()">Calcular Agora</button>

    <div id="resultado"></div>
</div>

<script>
    function calcular() {
        const genero = document.getElementById('genero').value;
        const idade = Number(document.getElementById('idade').value);
        const peso = Number(document.getElementById('peso').value);
        const altura = Number(document.getElementById('altura').value);
        const resDiv = document.getElementById('resultado');

        if(!idade || !peso || !altura) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        // Cálculo IMC
        const imc = (peso / ((altura/100) * (altura/100))).toFixed(1);
        
        // Cálculo Taxa Metabólica Basal (Mifflin-St Jeor)
        let tmb;
        if(genero === 'm') {
            tmb = (10 * peso) + (6.25 * altura) - (5 * idade) + 5;
        } else {
            tmb = (10 * peso) + (6.25 * altura) - (5 * idade) - 161;
        }

        resDiv.style.display = 'block';
        resDiv.innerHTML = `
            <strong>Seu IMC:</strong> ${imc}<br>
            <strong>Gasto Calórico Base:</strong> ${tmb.toFixed(0)} kcal/dia<br><br>
            <small>*Para emagrecer, consuma menos que seu gasto base ou aumente exercícios.</small>
        `;
    }
</script>

</body>
</html>
